<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Resumen de Quiz</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: sans-serif;
            padding-left: 20px;
            padding-right: 20px;
        }
        .chart-container { width: 600px; margin-bottom: 40px; }
    </style>
</head>
<body>
    <h1>Resumen del Quiz</h1>
    <input type="file" id="jsonFile" accept=".json">
    <div id="output"></div>

    <script>
    document.getElementById('jsonFile').addEventListener('change', function (event) {
        const file = event.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function (e) {
            const json = JSON.parse(e.target.result);
            renderQuizData(json.data);
        };
        reader.readAsText(file);
    });

    function renderQuizData(json) {
      const output = document.getElementById('output');
      output.innerHTML = '';

      // 1. Título del quiz
      const title = json.quizzes?.[0]?.title || "Quiz sin título";
      output.innerHTML += `<h1>${title}</h1>`;

      const userList = json.quizzes[0].quiz_responses;
      const responses = json.quiz_responses;
      const users = [];
      const questionsMap = new Map();

      userList.forEach(response => {
        console.log(response)
        const user = response.user?.user_profile;
        if (user) users.push(user);
      });

      responses.forEach(response => {
        response.user_answers.forEach(answer => {
          const question = answer.question;
          if (!question || !question.question_id) return;

          if (!questionsMap.has(question.question_id)) {
            questionsMap.set(question.question_id, {
              question: question.question,
              options: question.answer_options.map(o => ({ id: o.id, text: o.option })),
              answers: []
            });
          }

          const questionData = questionsMap.get(question.question_id);

          // Tipos de respuestas
          if (answer.single_choice_option_id) {
            questionData.answers.push(answer.single_choice_option_id);
          } else if (answer.user_multiple_choices?.length > 0) {
            answer.user_multiple_choices.forEach(choice => {
              questionData.answers.push(choice.option_id);
            });
          } else if (answer.text_answer) {
            questionData.answers.push(answer.text_answer);
          } else if (answer.is_true) {
            questionData.answers.push(answer.is_true);
          }
        });
      });

      // 2. Mostrar usuarios
      // output.innerHTML += `<h2>Usuarios que respondieron</h2><ul>${users.map(u => `<li>${u.full_name} (${u.email})</li>`).join('')}</ul>`;

      // 3. Mostrar gráficas
      let chartIndex = 0;
      const chartsToRender = [];

      questionsMap.forEach((qData, qId) => {
        const canvasId = `chart-${chartIndex++}`;
        const div = document.createElement('div');
        div.className = 'chart-container';
        div.innerHTML = `<h3>${qData.question}</h3><canvas id="${canvasId}"></canvas>`;
        output.appendChild(div);

        chartsToRender.push({ canvasId, qData });
      });

      // 4. Renderizar los gráficos
      chartsToRender.forEach(({ canvasId, qData }) => {
        const counts = {};
        qData.options.forEach(o => counts[o.id] = 0);
        qData.answers.forEach(a => {
          if (counts[a] !== undefined) counts[a]++;
          else counts[a] = 1;
        });

        const labels = qData.options.map(o => o.text);
        const data = qData.options.map(o => counts[o.id] || 0);

        new Chart(document.getElementById(canvasId), {
          type: 'bar',
          data: {
            labels: labels,
            datasets: [{
              label: 'Cantidad de respuestas',
              data: data,
              backgroundColor: ['#626BFF', '#626BFF', '#626BFF', '#626BFF'],
              borderColor: ['#626BFF', '#626BFF', '#626BFF', '#626BFF'],
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  stepSize: 1
                }
              }
            }
          }
        });
      });

      // output.innerHTML += `<h2>Usuarios que respondieron</h2><ul>${users.map(u => `<li>${u.full_name} (${u.email})</li>`).join('')}</ul>`;
      output.insertAdjacentHTML("beforeend", `
        <h2>Usuarios que respondieron</h2>
        <ul>${users.map(u => `<li>${u.full_name} (${u.email})</li>`).join('')}</ul>
      `);
    }
  </script>
</body>
</html>
