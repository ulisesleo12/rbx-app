<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roboxmaker</title>

    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws://localhost:8080 http://localhost:8080; frame-src 'self' https://landing.roboxmaker.com https://*.roboxmaker.com;">

    <link rel="icon" href="./logo-robox-maker.ico" />

    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #f4f4f4;
        }

        #root,
        #app {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* Regla agresiva 1: Si Yew mete un div intermediario, oblígalo a estirarse */
        #root>div,
        #app>div {
            width: 100%;
            height: 100%;
        }

        /* Regla agresiva 2: El iframe medirá el 100% de la PANTALLA, sin importar sus padres */
        iframe {
            width: 100vw !important;
            height: 100vh !important;
            border: none;
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body>
    <div id="root"></div>
    <div id="app"></div>

    <script src="./bootstrap.js"></script>
</body>

</html>
