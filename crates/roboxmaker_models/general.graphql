query GetSchools {
    inventory_group(order_by: {school_group: {school: {school_profile: {name: asc}}}}) {
        school_group {
            group_id
            school_id
            school {
                school_profile {
                    name
                }
            }
        }
    }
}


query GroupsBySchoolId($school_ids: [uuid!]!) {
    class_group(where: {school_group: {school_id: {_in: $school_ids}}}, order_by: {class_profile: {order: asc}}) {
        class_profile {
            name
        }
        group_id
        school_group {
            school_id
        }
    }
}
