subscription QuizWithUserAnswersByUser($quiz_id: uuid!, $user_ids: [uuid!]!) {
    quiz_responses(where: {quiz_id: {_eq: $quiz_id}, user_id: {_in: $user_ids}}, order_by: {user: {user_profile: {full_name: asc}}}) {
        user_id
        started_at
        completed_at
        status
        total_score
        user {
            user_profile {
                user_id
                full_name
                email
            }
        }
        user_answers(order_by: {question: {question_order: asc}}) {
            quiz_response_id
            question_id
            answered_at
            answer_type
            is_true
            text_answer
            score
            single_choice_option_id
            user_answer_id
            user_multiple_choices {
                id
                option_id
                user_answer_id
            }
            question {
                section_id
                question_order
                question_id
                question
                points
                question_type
                answer_options {
                    id
                    option
                    question_id
                    is_correct
                }
            }
        }
    }
}

mutation UpdateUserAnswer($user_answer_id: uuid!, $quiz_response_id: uuid!, $is_true: Boolean!) {
    update_user_answers_by_pk(pk_columns: {quiz_response_id: $quiz_response_id, user_answer_id: $user_answer_id}, _set: {is_true: $is_true}) {
        question_id
        quiz_response_id
        is_true
    }
}
