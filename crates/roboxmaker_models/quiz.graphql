mutation SubmitMultiAnswer($answer_type: String!, $answered_at: timestamp!, $is_true: Boolean, $question_id: uuid!, $quiz_response_id: uuid!, $score: Int, $single_choice_option_id: uuid, $text_answer: String, $user_answer_id: uuid!, $user_multiple_choices: [user_multiple_choices_insert_input!]!) {
    insert_user_answers(objects: {answer_type: $answer_type, answered_at: $answered_at, is_true: $is_true, question_id: $question_id, quiz_response_id: $quiz_response_id, score: $score, single_choice_option_id: $single_choice_option_id, text_answer: $text_answer, user_answer_id: $user_answer_id}) {
        affected_rows
    }
    insert_user_multiple_choices(objects: $user_multiple_choices) {
        affected_rows
    }
}

mutation DeleteQuizById($quiz_id: uuid!) {
    delete_quizzes_by_pk(quiz_id: $quiz_id) {
        quiz_id
    }
}

subscription QuizzesListByGroup($group_id: uuid!) {
    quizzes_group(where: {group_id: {_eq: $group_id}}) {
        quiz_id
        published
        archived
        group_id
        quiz {
            title
            created_at
        }
    }
}

mutation QuizGroupDelete($group_id: uuid!, $quiz_id: uuid!) {
    delete_quizzes_group(where: {group_id: {_eq: $group_id}, quiz_id: {_eq: $quiz_id}}) {
        affected_rows
        returning {
            group_id
            quiz_id
        }
    }
}

mutation QuizToGroupAdd($group_id: uuid!, $quiz_id: uuid!) {
    insert_quizzes_group_one(object: {group_id: $group_id, quiz_id: $quiz_id}) {
        group_id
        quiz_id
    }
}


mutation UpdateQuizGroupOptions($group_id: uuid!, $quiz_id: uuid!, $published: Boolean!, $archived: Boolean!) {
    update_quizzes_group_by_pk(pk_columns: {group_id: $group_id, quiz_id: $quiz_id}, _set: {published: $published, archived: $archived}) {
        published
        archived
    }
}

subscription QuizById($quiz_id: uuid!, $group_id: uuid!) {
    quizzes_group_by_pk(group_id: $group_id, quiz_id: $quiz_id) {
        quiz {
            quiz_id
            title
            description
            created_at
            state
            is_evaluation
            question_sections(order_by: {section_order: asc}) {
                title
                description
                observation
                section_id
                quiz_id
                questions(order_by: {question_order: asc}) {
                    question
                    points
                    question_type
                    question_id
                    section_id
                    answer_options(order_by: {option_order: asc}) {
                        option
                        is_correct
                        id
                        question_id
                    }
                }
            }
            quiz_responses {
                quiz_response_id
                quiz_id
                user_id
                status
                started_at
                completed_at
            }
            author_id
            user_profile {
                full_name
                pic_path
                user_id
            }
        }
        published
        archived
        class_profile {
            class_profile {
                name
            }
        }
    }
}


query QuizByName($search: String!) {
    quizzes(where: {title: {_ilike: $search}}) {
        quiz_id
        title
        quizzes_groups {
            group_id
        }
    }
}

subscription QuizzesByGroupId($group_id: uuid!) {
    quizzes_group(where: {group_id: {_eq: $group_id}}, order_by: {quiz: {created_at: desc}}, limit: 10) {
        quiz {
            quiz_id
            title
            created_at
        }
    }
}

query GetQuizzes {
    quizzes(order_by: {created_at: desc}) {
        title
        state
        quiz_id
        created_at
    }
}

query UsersByGroupId($group_ids: [uuid!]!, $school_id: uuid!) {
    user_profile(where: {group_member: {school_group: {school_id: {_eq: $school_id}}, group_id: {_in: $group_ids}}}, order_by: {full_name: asc}) {
        user_id
        email
        full_name
    }
}


