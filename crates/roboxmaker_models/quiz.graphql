mutation SubmitSingleAnswer($answer_type: String!, $answered_at: timestamp!, $is_true: Boolean, $question_id: uuid!, $quiz_response_id: uuid!, $score: Int, $single_choice_option_id: uuid, $text_answer: String, $user_answer_id: uuid!) {
    insert_user_answers(objects: {answer_type: $answer_type, answered_at: $answered_at, is_true: $is_true, question_id: $question_id, quiz_response_id: $quiz_response_id, score: $score, single_choice_option_id: $single_choice_option_id, text_answer: $text_answer, user_answer_id: $user_answer_id}) {
        affected_rows
    }
}

