mutation new_quiz($quiz_id: uuid!, $group_id: uuid!, $title: String = "", $description: String = "", $created_at: timestamp!, $is_evaluation: Boolean!) {
    insert_quizzes_one(object: {title: $title, description: $description, quiz_id: $quiz_id, created_at: $created_at, is_evaluation: $is_evaluation}) {
        quiz_id
        title
        description
        created_at
        updated_at
    }
    insert_quizzes_group_one(object: {group_id: $group_id, quiz_id: $quiz_id, published: false, archived: false}) {
        quiz_id
        group_id
    }
}

mutation update_quiz($quiz_id: uuid!, $title: String!, $description: String = "", $state: String!, $updated_at: timestamp!, $is_evaluation: Boolean!) {
    update_quizzes_by_pk(pk_columns: {quiz_id: $quiz_id}, _set: {updated_at: $updated_at, title: $title, description: $description, state: $state, is_evaluation: $is_evaluation}) {
        quiz_id
        title
        description
        updated_at
        state
    }
}

mutation update_inset_section($title: String!, $description: String = "", $observation: String = "", $quiz_id: uuid!, $section_id: uuid!, $section_order: Int = 0) {
    insert_question_sections_one(object: {title: $title, description: $description, observation: $observation, section_id: $section_id, quiz_id: $quiz_id, section_order: $section_order}, on_conflict: {constraint: question_sections_id_key, update_columns: [title, description, observation, section_order, quiz_id]}) {
        title
        section_id
        quiz_id
        observation
        description
        section_order
    }
}

mutation upset_question_answer_options($question_id: uuid!, $question: String!, $question_order: Int = 1, $question_type: robox_question_type_enum!, $section_id: uuid!, $points: Int, $answer_options: [answer_options_insert_input!]!) {
    insert_questions_one(object: {question_id: $question_id, question: $question, question_order: $question_order, question_type: $question_type, section_id: $section_id, points: $points}, on_conflict: {constraint: questions_id_key, update_columns: [question, question_order, question_type, points]}) {
        question_id
        section_id
    }
    insert_answer_options(objects: $answer_options, on_conflict: {constraint: answer_options_id_key, update_columns: [option, option_order, is_correct]}) {
        returning {
        id
        option
        }
    }
}

mutation DeleteQuestionSectionById($quiz_id: uuid!, $section_id: uuid!) {
    delete_question_sections_by_pk(quiz_id: $quiz_id, section_id: $section_id) {
        quiz_id
        section_id
    }
}

mutation DeleteQuestionById($question_id: uuid!) {
    delete_questions_by_pk(question_id: $question_id) {
        section_id
        question_id
    }
}

mutation DeleteOptionById($question_id: uuid!, $answer_id: uuid!) {
    delete_answer_options_by_pk(id: $answer_id, question_id: $question_id) {
        id
        question_id
    }
}

mutation UpsertQuizResponse($quiz_response_id: uuid!, $quiz_id: uuid!, $user_id: uuid!, $status: String!, $completed_at: timestamp!, $started_at: timestamp!) {
    insert_quiz_responses_one(object: {quiz_response_id: $quiz_response_id, quiz_id: $quiz_id, user_id: $user_id, started_at: $started_at, completed_at: $completed_at, status: $status, total_score: 0, attempts: 0}, on_conflict: {constraint: quiz_responses_pkey, update_columns: [status, completed_at]}) {
        quiz_response_id
        quiz_id
        user_id
    }
}

mutation SubmitAnswers($user_answers: [user_answers_insert_input!]!) {
    insert_user_answers(objects: $user_answers) {
        returning {
        quiz_response_id
        question_id
        user_answer_id
        }
    }
}

