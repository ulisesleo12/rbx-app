subscription get_post_list($group_id: uuid!, $maybe_timestamp: order_by, $timestamp: order_by) {
  class_group(where: {group_id: {_eq: $group_id}}) {
    class_profile {
      name
      section_id
      class_post(order_by: {post_profile: {post_group: {maybe_timestamp: $maybe_timestamp}, timestamp: $timestamp}}) {
        section_id
        post_profile {
          topic
          timestamp
          post_id
          author_id
          author_profile {
            full_name
            pic_path
          }
          post_group {
            maybe_timestamp
            message_posts(where: {group_id: {_eq: $group_id}}) {
              post_id
            }
          }
        }
      }
    }
    post_groups(where: {group_id: {_eq: $group_id}}) {
      archived
      published
      post_id
    }
  }
}