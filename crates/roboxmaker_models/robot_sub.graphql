subscription get_robot_list($group_id: uuid!) {
  class_group(where: {group_id: {_eq: $group_id}}) {
    class_profile {
      class_id
      name
      section_id
      class_robot(order_by: {robot_profile: {name: asc}}) {
        section_id
        robot_profile {
          name
          path
          robot_id
        }
      }
    }
    robot_groups(where: {group_id: {_eq: $group_id}}) {
      group_id
      robot_id
      robot_type
      enabled
    }
  }
}