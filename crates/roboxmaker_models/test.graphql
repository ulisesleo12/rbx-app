subscription user_by_id($user_id: uuid!) {
  user_by_pk(id: $user_id) {
    user_profile {
      email
      full_name
      pic_path
      user_id
      group_member {
        school_group {
          school {
            school_profile {
              name
            }
          }
        }
      }
    }
    user_staff {
      user_id
    }
    user_student {
      user_id
    }
    user_teacher {
      user_id
    }
    license {
      license
    }
    id
    group_member {
      group_id
    }
  }
}

query school_by_id($school_id: uuid!) {
  school_by_pk(id: $school_id) {
    school_profile {
      school_id
      code
      name
      address
      biography
      logo
      mission
      motto
      telephone
      vision
      we_are
      inventory_group {
        group_id
      }
    }
  }
}

subscription home_data_by_group_id($group_id: uuid!, $limit: Int!, $timestamp: order_by, $maybe_timestamp: order_by, $scheduled_meetings: date!) {
  class_group(where: {group_id: {_eq: $group_id}}) {
    post_groups(where: {group_id: {_eq: $group_id}}, order_by: {maybe_timestamp: $maybe_timestamp, post_profile: {timestamp: $timestamp}}, limit: $limit) {
      post_profile {
        topic
        post_id
        timestamp
        author_profile {
          full_name
          pic_path
        }
      }
      maybe_timestamp
    }
    classes_groups(where: {group_id: {_eq: $group_id}}, order_by: {classes_profile: {timestamp: desc}}, limit: $limit) {
      classes_profile {
        topic
        timestamp
        classes_id
      }
    }
    lesson_groups(where: {group_id: {_eq: $group_id}, _not: {lesson_profile: {lesson_type: {_eq: TEACHING_CARDS}}}}, order_by: {lesson_profile: {title: asc}}) {
      lesson_profile {
        title
        timestamp
        lesson_id
        lesson_type
        author_profile {
          full_name
          pic_path
          user_id
        }
      }
    }
    robot_groups(where: {group_id: {_eq: $group_id}}, limit: $limit, order_by: {robot_profile: {name: asc}}) {
      robot_profile {
        name
        timestamp
        path
        robot_id
      }
    }
    meetings_groups(where: {group_id: {_eq: $group_id}, meetings_profile: {schedule_time: {_gte: $scheduled_meetings}}}, limit: $limit, order_by: {meetings_profile: {schedule_time: asc}}) {
      meetings_profile {
        title
        schedule_time
        meet_id
        start_of_meeting
        end_of_meeting
        author_profile {
          full_name
          user_staff {
            user_id
          }
          user_teacher {
            user_id
          }
        }
      }
    }
    group_members(where: {group_id: {_eq: $group_id}}, order_by: {user_profile: {full_name: asc}}) {
      user_profile {
        full_name
        pic_path
        user_id
        user_staff {
          user_id
        }
        user_student {
          user_id
        }
        user_teacher {
          user_id
        }
      }
    }
  }
}