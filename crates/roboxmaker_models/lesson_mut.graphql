mutation lesson_class_and_group_add($group_id: uuid!, $lesson_id: uuid!, $section_id: uuid!) {
  insert_lesson_group_one(object: {group_id: $group_id, lesson_id: $lesson_id}) {
    group_id
    lesson_id
  }
  insert_class_lesson_one(object: {lesson_id: $lesson_id, section_id: $section_id}) {
    lesson_id
    section_id
  }
}


mutation lesson_class_and_group_create($title: String!, $content: String!, $group_id: uuid!, $inventory_group_id: uuid!, $lesson_id: uuid!, $timestamp: timestamp!, $lesson_type: robox_lesson_type_enum!, $section_id: uuid!) {
  insert_lesson_content_one(object: {content: $content, lesson_profile: {data: {title: $title, lesson_group: {data: {group_id: $group_id, lesson: {data: {id: $lesson_id}}}}, timestamp: $timestamp, lesson_type: $lesson_type}}}) {
    lesson_id
  }
  insert_lesson_group_one(object: {group_id: $inventory_group_id, lesson_id: $lesson_id}) {
    lesson_id
  }
  insert_class_lesson_one(object: {lesson_id: $lesson_id, section_id: $section_id}) {
    lesson_id
    section_id
  }
}

mutation lesson_group_delete($group_id: uuid!, $lesson_id: uuid!) {
  delete_lesson_group(where: {group_id: {_eq: $group_id}, lesson_id: {_eq: $lesson_id}}) {
    returning {
      group_id
      lesson_id
    }
  }
}


mutation delete_lesson($lesson_id: uuid!) {
  delete_lesson_by_pk(id: $lesson_id) {
    id
  }
}