mutation classes_class_and_group_add($group_id: uuid!, $classes_id: uuid!, $section_id: uuid! ) {
  insert_classes_group_one(object: {group_id: $group_id, classes_id: $classes_id}) {
    group_id
    classes_id
  }
  insert_class_classes_one(object: {classes_id: $classes_id, section_id: $section_id}) {
    classes_id
    section_id
  }
}

mutation classes_group_delete($group_id: uuid!, $classes_id: uuid!) {
  delete_classes_group(where: {group_id: {_eq: $group_id}, classes_id: {_eq: $classes_id}}) {
    returning {
      group_id
      classes_id
    }
  }
}

mutation classes_class_and_group_create($topic: String!, $content: String!, $group_id: uuid!, $inventory_group_id: uuid!, $classes_id: uuid!, $timestamp: timestamp!, $section_id: uuid!) {
  insert_classes_content_one(object: {content: $content, classes_profile: {data: {topic: $topic, classes_group: {data: {group_id: $group_id, classes: {data: {id: $classes_id}}}}, timestamp: $timestamp}}}) {
    classes_id
  }
  insert_classes_group_one(object: {group_id: $inventory_group_id, classes_id: $classes_id}) {
    classes_id
  }
  insert_class_classes_one(object: {classes_id: $classes_id, section_id: $section_id}) {
    classes_id
    section_id
  }
}
