mutation teacher_resource_group_create($title: String!, $group_id: uuid!, $inventory_group_id: uuid!, $resource_id: uuid!, $timestamp: timestamp!, $teacher_resource_type: robox_teacher_resource_type_enum!) {
  insert_teacher_resource_content_one(object: {teacher_resource_profile: {data: {title: $title, timestamp: $timestamp, teacher_resource_type: $teacher_resource_type, teacher_resource_group: {data: {group_id: $group_id, resource_id: $resource_id}}, teacher_resource: {data: {id: $resource_id}}}}}) {
    resource_id
  }
  insert_teacher_resource_group_one(object: {group_id: $inventory_group_id, resource_id: $resource_id}) {
    resource_id
  }
}

mutation teacher_resource_group_add($group_id: uuid!, $resource_id: uuid!) {
  insert_teacher_resource_group_one(object: {group_id: $group_id, resource_id: $resource_id}) {
    group_id
    resource_id
  }
}

subscription teacher_resource_list_by_group($group_id: uuid!) {
  teacher_resource_group(where: {group_id: {_eq: $group_id}}, order_by: {teacher_resource_profile: {title: asc}}) {
    archived
    resource_id
    send_to_grade
    teacher_resource_profile {
      title
      timestamp
      author_id
      teacher_resource_type
      author {
        user_staff {
          user_id
        }
        user_teacher {
          user_id
        }
        user_student {
          user_id
        }
        user_profile {
          full_name
          pic_path
        }
      }
    }
    school_group {
      school {
        school_profile {
          name
          logo
        }
      }
    }
  }
}

