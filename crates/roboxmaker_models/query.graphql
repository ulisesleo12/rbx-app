mutation school_profile_by_id_update($school_id: uuid!, $address: String!, $biography: String!, $mission: String!, $motto: String!, $name: String!, $telephone: String!, $vision: String!, $we_are: String!, $logo: String!) {
  update_school_profile_by_pk(pk_columns: {school_id: $school_id}, _set: {address: $address, biography: $biography, mission: $mission, motto: $motto, name: $name, telephone: $telephone, vision: $vision, we_are: $we_are, logo: $logo}) {
    school_id
  }
}

