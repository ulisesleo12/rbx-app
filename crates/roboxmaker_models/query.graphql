mutation new_user_create($user_id: uuid!, $license: String!, $full_name: String!, $pic_path: String!, $first_name: String!, $last_name: String!, $email: String!, $password: String!, $role: String!, $school_id: uuid!, $group_id: uuid!, $inventory_group_id: uuid!, $username: String!) {
  create_user_action(user_id: $user_id, first_name: $first_name, password: $password, role: $role, email: $email, last_name: $last_name, school_id: $school_id, username: $username) {
    code
    message
  }
  insert_user_student(objects: {user: {data: {id: $user_id}}}) {
    affected_rows
  }
  update_license_by_pk(pk_columns: {license: $license}, _set: {user_id: $user_id, group_id: $group_id}) {
    group_id
    school_id
  }
  insert_user_profile(objects: {full_name: $full_name, pic_path: $pic_path, group_member: {data: {group_id: $group_id, user_id: $user_id}}, email: $email}) {
    affected_rows
  }
  insert_group_member(objects: {group_id: $inventory_group_id, user_id: $user_id}) {
    affected_rows
  }
}

