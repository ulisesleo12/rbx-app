query search_by_universal_grade_by_group_id($search: String!, $group_id: uuid!, $schedule_time: date!) {
  post_profile(where: {post_group: {group_id: {_eq: $group_id}}, topic: {_ilike: $search}}, order_by: {topic: asc}) {
    topic
    post_id
  }
  classes_profile(where: {classes_group: {group_id: {_eq: $group_id}}, topic: {_ilike: $search}}, order_by: {topic: asc}) {
    topic
    classes_id
  }
  lesson_profile(where: {lesson_group: {group_id: {_eq: $group_id}}, title: {_ilike: $search}}, order_by: {title: asc}) {
    title
    lesson_id
    author_id
    timestamp
    lesson_type
    lesson_content {
      content
    }
  }
  robot_profile(where: {robot_group: {group_id: {_eq: $group_id}}, name: {_ilike: $search}}, order_by: {name: asc}) {
    name
    robot_id
  }
  user_profile(where: {group_member: {group_id: {_eq: $group_id}}, full_name: {_ilike: $search}}, order_by: {full_name: asc}) {
    full_name
    user_id
  }
  meetings_profile(where: {meetings_group: {group_id: {_eq: $group_id}}, title: {_ilike: $search}, schedule_time: {_gte: $schedule_time}}, order_by: {title: asc}) {
    title
    meet_id
  }
}

