  delete_teacher_resources_by_pk(id: $resource_id) {
    id
  }
}

mutation update_teacher_resource_group_options($group_id: uuid!, $resource_id: uuid!, $send_to_grade: Boolean!, $archived: Boolean!) {
  update_teacher_resource_group_by_pk(pk_columns: {group_id: $group_id, resource_id: $resource_id}, _set: {send_to_grade: $send_to_grade, archived: $archived}) {
    send_to_grade
    archived
  }
}

subscription teacher_resource_by_id($group_id: uuid!, $resource_id: uuid!) {
  teacher_resource_group_by_pk(resource_id: $resource_id, group_id: $group_id) {
    teacher_resource_profile {
      title
      timestamp
      author_id
      resource_id
      teacher_resource_type
      author_profile {
        full_name
        user_id
        pic_path
        user_staff {
          user_id
        }
        user_teacher {
          user_id
        }
      }
    }
    send_to_grade
    archived
    class_profile {
      class_profile {
        name
      }
    }
  }
}


