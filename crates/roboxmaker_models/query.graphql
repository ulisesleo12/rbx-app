query my_contributions_and_comments($author_id: uuid!) {
  message(where: {message_profile: {message_content: {message_profile: {author_id: {_eq: $author_id}}}, message_profile_by_reply_id: {message_profile: {author_id: {_eq: $author_id}}}}}, order_by: {message_profile: {timestamp: desc}}) {
    id
    message_profile {
      message_content {
        content
      }
      author {
        full_name
      }
      message_profile_by_reply_id {
        id
        message_profile {
          message_content {
            content
            message_group {
              lesson {
                id
                lesson_profile {
                  title
                }
              }
              post {
                id
                post_profile {
                  topic
                }
              }
              robot {
                id
                robot_profile {
                  name
                }
              }
            }
          }
          timestamp
          author {
            full_name
          }
        }
      }
    }
  }
}

