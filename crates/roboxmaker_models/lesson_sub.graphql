subscription get_lesson_list($group_id: uuid!) {
  class_group(where: {group_id: {_eq: $group_id}}) {
    class_profile {
      name
      section_id
      class_lesson(order_by: {lesson_profile: {title: asc}}) {
        lesson_profile {
          title
          timestamp
          lesson_type
          lesson_id
          author_id
          author {
            user_staff {
              user_id
            }
            user_student {
              user_id
            }
            user_profile {
              full_name
              pic_path
            }
          }
          lesson_group {
            archived
            send_to_grade
            lesson_id
          }
          lesson_content {
            content
          }
        }
      }
    }
    school_group {
      school {
        school_profile {
          name
          logo
        }
      }
    }
  }
}